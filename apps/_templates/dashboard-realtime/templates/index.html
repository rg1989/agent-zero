<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  {% if app_name %}<base href="/{{ app_name }}/">{% endif %}
  <link rel="stylesheet" href="static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="layout">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-brand">
        <span class="topbar-icon">◈</span>
        <span class="topbar-title">{{ title }}</span>
      </div>
      <div class="topbar-right">
        <span class="status-dot" id="status-dot"></span>
        <span class="text-muted" id="status-label">Connecting…</span>
        <span class="text-muted" id="updated-at"></span>
      </div>
    </header>

    <main class="main">

      <!-- Metric cards -->
      <div class="metrics-grid" id="metrics-grid">
        <!-- Populated by JS on first SSE message -->
      </div>

      <!-- Line chart — full width -->
      <section class="card chart-full">
        <div class="card-header">
          <h2 class="card-title">Time Series</h2>
        </div>
        <div class="chart-wrap chart-wrap-line">
          <canvas id="chart-line"></canvas>
        </div>
      </section>

      <!-- Bar + Doughnut — side by side -->
      <div class="charts-grid">

        <section class="card">
          <div class="card-header">
            <h2 class="card-title">Categories</h2>
          </div>
          <div class="chart-wrap chart-wrap-bar">
            <canvas id="chart-bar"></canvas>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2 class="card-title">Breakdown</h2>
          </div>
          <div class="chart-wrap chart-wrap-doughnut">
            <canvas id="chart-doughnut"></canvas>
          </div>
        </section>

      </div>

    </main>
  </div>

  <script>
  // ── Chart instances ──────────────────────────────────────────────────────────
  let lineChart     = null;
  let barChart      = null;
  let doughnutChart = null;

  // ── Chart defaults ────────────────────────────────────────────────────────────
  const CHART_OPTS_BASE = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300 },
    plugins: {
      legend: { labels: { color: "#aaa", font: { size: 12 }, boxWidth: 12 } },
    },
  };

  const SCALE_OPTS = {
    x: { ticks: { color: "#666", maxRotation: 0 }, grid: { color: "#222" } },
    y: { ticks: { color: "#666" },                  grid: { color: "#222" } },
  };

  // ── Render: metrics ───────────────────────────────────────────────────────────
  function renderMetrics(metrics) {
    const grid = document.getElementById("metrics-grid");
    grid.innerHTML = metrics.map(m => `
      <div class="metric-card">
        <div class="metric-label">${m.label}</div>
        <div class="metric-value" style="color:${m.color || '#00f2fe'}">${m.value}<span class="metric-unit">${m.unit || ''}</span></div>
      </div>
    `).join("");
  }

  // ── Render: line chart ────────────────────────────────────────────────────────
  function renderLineChart(lineData) {
    const ctx = document.getElementById("chart-line").getContext("2d");
    const chartData = {
      labels: lineData.labels,
      datasets: lineData.datasets.map(ds => ({
        label:           ds.label,
        data:            ds.data,
        borderColor:     ds.color || "#00f2fe",
        backgroundColor: (ds.color || "#00f2fe") + "22",
        borderWidth:     2,
        pointRadius:     3,
        tension:         0.35,
        fill:            true,
      })),
    };
    if (lineChart) {
      lineChart.data = chartData;
      lineChart.update("none");
    } else {
      lineChart = new Chart(ctx, {
        type: "line",
        data: chartData,
        options: { ...CHART_OPTS_BASE, scales: SCALE_OPTS },
      });
    }
  }

  // ── Render: bar chart ─────────────────────────────────────────────────────────
  function renderBarChart(barData) {
    const ctx = document.getElementById("chart-bar").getContext("2d");
    const chartData = {
      labels: barData.labels,
      datasets: barData.datasets.map(ds => ({
        label:           ds.label,
        data:            ds.data,
        backgroundColor: (ds.color || "#00ff9d") + "99",
        borderColor:     ds.color || "#00ff9d",
        borderWidth:     1,
        borderRadius:    4,
      })),
    };
    if (barChart) {
      barChart.data = chartData;
      barChart.update("none");
    } else {
      barChart = new Chart(ctx, {
        type: "bar",
        data: chartData,
        options: { ...CHART_OPTS_BASE, scales: SCALE_OPTS },
      });
    }
  }

  // ── Render: doughnut chart ────────────────────────────────────────────────────
  function renderDoughnutChart(doughnutData) {
    const ctx = document.getElementById("chart-doughnut").getContext("2d");
    const ds  = doughnutData.datasets[0];
    const chartData = {
      labels: doughnutData.labels,
      datasets: [{
        data:            ds.data,
        backgroundColor: ds.colors || ["#00f2fe", "#00ff9d", "#ff9500", "#ff4444"],
        borderColor:     "#141414",
        borderWidth:     2,
        hoverOffset:     8,
      }],
    };
    if (doughnutChart) {
      doughnutChart.data = chartData;
      doughnutChart.update("none");
    } else {
      doughnutChart = new Chart(ctx, {
        type: "doughnut",
        data: chartData,
        options: {
          ...CHART_OPTS_BASE,
          cutout: "60%",
          plugins: {
            legend: { position: "bottom", labels: { color: "#aaa", font: { size: 11 }, boxWidth: 12 } },
          },
        },
      });
    }
  }

  // ── Status helpers ────────────────────────────────────────────────────────────
  function setStatus(state) {
    const dot   = document.getElementById("status-dot");
    const label = document.getElementById("status-label");
    dot.className = "status-dot " + state;
    label.textContent = { connected: "Live", reconnecting: "Reconnecting…", error: "Error" }[state] || state;
  }

  function setUpdatedAt(ts) {
    document.getElementById("updated-at").textContent =
      ts ? new Date(ts * 1000).toLocaleTimeString() : "";
  }

  // ── SSE connection ────────────────────────────────────────────────────────────
  let pollTimer = null;

  function connectSSE() {
    const es = new EventSource("api/stream");

    es.addEventListener("message", (e) => {
      try {
        const data = JSON.parse(e.data);
        // Stop polling if it was running as fallback
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        setStatus("connected");
        renderMetrics(data.metrics || []);
        renderLineChart(data.charts.line  || {});
        renderBarChart(data.charts.bar    || {});
        renderDoughnutChart(data.charts.doughnut || {});
        setUpdatedAt(data.updated_at);
      } catch (err) {
        console.error("SSE parse error:", err);
      }
    });

    es.addEventListener("error", () => {
      setStatus("reconnecting");
      // Start polling fallback if SSE fails
      if (!pollTimer) {
        pollTimer = setInterval(pollFallback, 5000);
        pollFallback(); // immediate first poll
      }
    });
  }

  // ── Polling fallback ──────────────────────────────────────────────────────────
  async function pollFallback() {
    try {
      const res  = await fetch("api/data");
      const data = await res.json();
      setStatus("error"); // show error state when using fallback
      renderMetrics(data.metrics || []);
      renderLineChart(data.charts.line  || {});
      renderBarChart(data.charts.bar    || {});
      renderDoughnutChart(data.charts.doughnut || {});
      setUpdatedAt(data.updated_at);
    } catch (err) {
      setStatus("error");
      console.error("Poll fallback error:", err);
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  connectSSE();
  </script>

</body>
</html>
